services:
  - type: web
    name: freshline
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_MAX_TOKENS
        value: "4096"
      - key: GROQ_TEMPERATURE
        value: "0.1"
      - key: MAX_CONTEXT_TOKENS
        value: "6000"
