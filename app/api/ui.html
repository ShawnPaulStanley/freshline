<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreshLine</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f3f5f9;
      --card: #ffffff;
      --line: #e6e9f0;
      --text: #1b2330;
      --muted: #5f6d82;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --surface: #f8fafc;
      --output: #0f172a;
      --output-text: #e2e8f0;
      --radius: 14px;
      --shadow: 0 8px 28px rgba(2, 6, 23, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #eef2ff 0, var(--bg) 220px);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1020px;
      margin: 28px auto;
      padding: 0 16px 24px;
    }

    .hero {
      margin-bottom: 14px;
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.5rem);
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 1.2rem;
      letter-spacing: -0.01em;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"],
    input[type="file"],
    select,
    button {
      font-family: inherit;
      font-size: 0.95rem;
      border-radius: 10px;
      border: 1px solid #cfd6e4;
      transition: all .15s ease;
    }

    input[type="text"],
    select {
      padding: 10px 12px;
      background: #fff;
      min-height: 42px;
    }

    input[type="file"] {
      padding: 8px;
      background: #fff;
      min-height: 42px;
    }

    input[type="text"]:focus,
    select:focus,
    input[type="file"]:focus {
      outline: none;
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
    }

    button {
      padding: 10px 14px;
      min-height: 42px;
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      border-color: #9ca9be;
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .muted {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .spacer {
      margin-top: 10px;
    }

    .output {
      white-space: pre-wrap;
      background: var(--output);
      color: var(--output-text);
      padding: 14px;
      border-radius: 12px;
      min-height: 230px;
      border: 1px solid #1f2a44;
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.87rem;
      line-height: 1.5;
    }

    .status {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: #1f2937;
      font-size: 0.92rem;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
    }

    .metric .label {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .metric .value {
      font-weight: 700;
      color: var(--text);
      font-size: 1rem;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    @media (max-width: 720px) {
      .split {
        grid-template-columns: 1fr;
      }

      input[type="text"],
      select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1 class="title">FreshLine</h1>
      <p class="subtitle">Modernize Java projects to Python with a clean, guided workflow.</p>
    </div>

    <div class="grid">
      <div class="card">
      <h3>1) Add project</h3>
      <div class="row">
        <input id="zipFile" type="file" accept=".zip" />
        <button id="uploadBtn" class="btn-primary">Upload Zip</button>
        <span id="uploadInfo" class="muted"></span>
      </div>
      <div class="row spacer">
        <input id="repoUrl" type="text" placeholder="https://github.com/owner/repo" style="min-width: 360px;" />
        <button id="importGithubBtn" class="btn-primary">Import GitHub</button>
        <span id="githubInfo" class="muted"></span>
      </div>
      </div>

      <div class="card">
      <h3>2) Select project</h3>
      <div class="row split">
        <select id="projectSelect" style="min-width: 260px; width: 100%;"></select>
        <button id="refreshBtn">Refresh Projects</button>
      </div>
      </div>

      <div class="card">
      <h3>3) Run</h3>
      <div class="row split">
        <label><input id="skipDead" type="checkbox" checked /> Skip dead code</label>
        <div class="row">
        <button id="analyzeBtn">Analyze</button>
        <button id="modernizeBtn" class="btn-primary">Modernize</button>
        <button id="downloadBtn">Download Output</button>
        <button id="cleanupBtn">Cleanup Storage</button>
        </div>
      </div>
      </div>

      <div class="card">
      <h3>Output</h3>
      <div id="statusBox" class="status">Ready</div>
      <div id="metrics" class="metrics" style="display: none;"></div>
      <pre id="output" class="output"></pre>
      </div>
    </div>
  </div>

  <script>
    const projectSelect = document.getElementById('projectSelect');
    const output = document.getElementById('output');
    const uploadInfo = document.getElementById('uploadInfo');
    const githubInfo = document.getElementById('githubInfo');
    const statusBox = document.getElementById('statusBox');
    const metricsBox = document.getElementById('metrics');

    function setStatus(message) {
      statusBox.textContent = message;
    }

    function renderMetrics(items) {
      if (!items || !items.length) {
        metricsBox.style.display = 'none';
        metricsBox.innerHTML = '';
        return;
      }
      metricsBox.style.display = 'grid';
      metricsBox.innerHTML = items.map(item => `
        <div class="metric">
          <div class="label">${item.label}</div>
          <div class="value">${item.value}</div>
        </div>
      `).join('');
    }

    function print(data) {
      if (typeof data === 'string') {
        output.textContent = data;
      } else {
        output.textContent = JSON.stringify(data, null, 2);
      }
    }

    async function api(url, options = {}) {
      const res = await fetch(url, options);
      const json = await res.json().catch(() => ({}));
      if (!res.ok) {
        const message = json.detail || JSON.stringify(json) || `Request failed (${res.status})`;
        throw new Error(message);
      }
      return json;
    }

    async function refreshProjects() {
      try {
        const data = await api('/api/projects');
        projectSelect.innerHTML = '';
        for (const name of data.projects) {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          projectSelect.appendChild(option);
        }
        if (!data.projects.length) {
          const option = document.createElement('option');
          option.textContent = 'No projects found';
          option.value = '';
          projectSelect.appendChild(option);
        }
        setStatus(`Loaded ${data.count} project(s).`);
      } catch (err) {
        print(`Failed to load projects: ${err.message}`);
        setStatus('Failed to load projects.');
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', refreshProjects);

    document.getElementById('uploadBtn').addEventListener('click', async () => {
      const fileInput = document.getElementById('zipFile');
      if (!fileInput.files.length) {
        print('Select a .zip file first.');
        return;
      }

      const form = new FormData();
      form.append('file', fileInput.files[0]);
      uploadInfo.textContent = 'Uploading...';
      setStatus('Uploading zip...');
      renderMetrics([]);

      try {
        const data = await api('/api/projects/upload-zip', { method: 'POST', body: form });
        uploadInfo.textContent = `Uploaded: ${data.project_name} (${data.java_files} Java files)`;
        await refreshProjects();
        if (data.project_name) {
          projectSelect.value = data.project_name;
        }
        setStatus(`Uploaded ${data.project_name}.`);
        renderMetrics([
          { label: 'Project', value: data.project_name },
          { label: 'Java Files', value: data.java_files },
        ]);
        print(data);
      } catch (err) {
        uploadInfo.textContent = 'Upload failed';
        setStatus('Upload failed.');
        print(`Upload failed: ${err.message}`);
      }
    });

    document.getElementById('importGithubBtn').addEventListener('click', async () => {
      const repoUrlInput = document.getElementById('repoUrl');
      const repoUrl = repoUrlInput.value.trim();
      if (!repoUrl) {
        print('Enter a GitHub repository URL first.');
        return;
      }

      githubInfo.textContent = 'Importing...';
      setStatus('Importing from GitHub...');
      renderMetrics([]);
      try {
        const data = await api(`/api/projects/import-github?repo_url=${encodeURIComponent(repoUrl)}&overwrite=true`, {
          method: 'POST'
        });
        githubInfo.textContent = `Imported: ${data.project_name} (${data.java_files} Java files)`;
        await refreshProjects();
        if (data.project_name) {
          projectSelect.value = data.project_name;
        }
        setStatus(`Imported ${data.project_name} from GitHub.`);
        renderMetrics([
          { label: 'Project', value: data.project_name },
          { label: 'Java Files', value: data.java_files },
        ]);
        print(data);
      } catch (err) {
        githubInfo.textContent = 'Import failed';
        setStatus('GitHub import failed.');
        print(`GitHub import failed: ${err.message}`);
      }
    });

    document.getElementById('analyzeBtn').addEventListener('click', async () => {
      const project = projectSelect.value;
      if (!project) {
        print('Select a project first.');
        return;
      }
      try {
        print('Analyzing...');
        setStatus(`Analyzing ${project}...`);
        renderMetrics([]);
        const data = await api(`/api/projects/${encodeURIComponent(project)}/analyze`);
        setStatus(`Analyze complete for ${project}.`);
        renderMetrics([
          { label: 'Files', value: data.files },
          { label: 'Classes', value: data.classes },
          { label: 'Methods', value: data.methods },
          { label: 'Dead Methods', value: data.dead_methods },
        ]);
        print(data);
      } catch (err) {
        setStatus('Analyze failed.');
        print(`Analyze failed: ${err.message}`);
      }
    });

    document.getElementById('modernizeBtn').addEventListener('click', async () => {
      const project = projectSelect.value;
      if (!project) {
        print('Select a project first.');
        return;
      }
      const skipDead = document.getElementById('skipDead').checked;
      try {
        print('Modernizing... This may take a while.');
        setStatus(`Modernizing ${project}...`);
        renderMetrics([]);
        const data = await api(`/api/projects/${encodeURIComponent(project)}/modernize?skip_dead_code=${skipDead}`, {
          method: 'POST'
        });
        const summary = {
          project_name: data.project_name,
          files_parsed: data.files_parsed,
          methods_converted: data.methods_converted,
          methods_skipped: data.methods_skipped,
          avg_confidence: data.avg_confidence,
          avg_compression_ratio: data.avg_compression_ratio,
          output_dir: data.output_dir,
        };
        setStatus(`Modernize complete for ${project}.`);
        renderMetrics([
          { label: 'Methods Converted', value: data.methods_converted },
          { label: 'Methods Skipped', value: data.methods_skipped },
          { label: 'Avg Confidence', value: `${Math.round((data.avg_confidence || 0) * 100)}%` },
          { label: 'Output', value: project },
        ]);
        print(summary);
      } catch (err) {
        setStatus('Modernize failed.');
        print(`Modernize failed: ${err.message}`);
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', async () => {
      const project = projectSelect.value;
      if (!project) {
        print('Select a project first.');
        return;
      }
      setStatus(`Preparing download for ${project}...`);
      window.location.href = `/api/projects/${encodeURIComponent(project)}/download-output`;
      setStatus(`Download started for ${project}.`);
    });

    document.getElementById('cleanupBtn').addEventListener('click', async () => {
      const project = projectSelect.value;
      if (!project) {
        print('Select a project first.');
        return;
      }

      const confirmed = window.confirm(`Delete uploaded source and output for '${project}' from server storage?`);
      if (!confirmed) {
        return;
      }

      try {
        setStatus(`Cleaning storage for ${project}...`);
        const data = await api(`/api/projects/${encodeURIComponent(project)}/storage`, {
          method: 'DELETE'
        });
        await refreshProjects();
        renderMetrics([
          { label: 'Deleted Upload', value: data.deleted_upload ? 'Yes' : 'No' },
          { label: 'Deleted Output', value: data.deleted_output ? 'Yes' : 'No' },
        ]);
        setStatus(`Cleanup complete for ${project}.`);
        print(data);
      } catch (err) {
        setStatus('Cleanup failed.');
        print(`Cleanup failed: ${err.message}`);
      }
    });

    refreshProjects();
  </script>
</body>
</html>
